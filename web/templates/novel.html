{{ define "novel.html" }}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小说详情</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
<header class="bg-white shadow-sm border-b">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="/" class="text-xl font-bold text-gray-800">📚 阅读记忆助手</a>
        <span class="text-sm text-gray-500">Reading Memory Agent</span>
    </div>
</header>
<main class="max-w-4xl mx-auto px-4 py-8">

<div class="space-y-6">
    <a href="/" class="text-blue-600 hover:underline text-sm">← 返回列表</a>

    <div id="novel-detail" class="bg-white rounded-lg shadow p-6">
        <div class="animate-pulse space-y-4">
            <div class="h-6 bg-gray-200 rounded w-1/3"></div>
            <div class="h-4 bg-gray-200 rounded w-1/4"></div>
        </div>
    </div>

    <!-- Progress + Actions -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div id="progress-section" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-lg font-semibold mb-4">📍 阅读进度</h2>
            <div class="flex items-center gap-3">
                <span class="text-gray-600 text-sm">当前读到：</span>
                <input type="number" id="progress-input" min="1" class="border rounded px-3 py-2 w-20 text-center text-sm" value="1">
                <span class="text-gray-400 text-sm">章</span>
                <button onclick="updateProgress()" class="bg-green-600 text-white px-3 py-2 rounded-lg hover:bg-green-700 transition text-sm">更新</button>
            </div>
            <p id="progress-feedback" class="text-sm mt-2 hidden"></p>
        </div>

        <div id="actions-section" class="bg-white rounded-lg shadow p-6 hidden">
            <h2 class="text-lg font-semibold mb-4">🔧 操作</h2>
            <div class="flex flex-wrap gap-2">
                <button onclick="generateRecap()" id="recap-btn" class="bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition text-sm">✨ 生成回顾</button>
                <button onclick="triggerParse()" class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition text-sm">🔄 AI 解析</button>
            </div>
            <div id="recap-status" class="mt-3 hidden"></div>
        </div>
    </div>

    <!-- Search -->
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold mb-3">🔍 语义搜索</h2>
        <div class="flex gap-2">
            <input type="text" id="search-input" placeholder="搜索人物、事件、关键词..." class="flex-1 border rounded-lg px-4 py-2 text-sm" onkeydown="if(event.key==='Enter')doSearch()">
            <button onclick="doSearch()" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition text-sm">搜索</button>
        </div>
        <div id="search-results" class="mt-4 hidden"></div>
    </div>

    <!-- Q&A Chat -->
    <div class="bg-white rounded-lg shadow p-6">
        <h2 class="text-lg font-semibold mb-3">🤖 智能问答</h2>
        <p class="text-xs text-gray-400 mb-3">基于当前阅读进度进行无剧透回答</p>
        <div id="qa-messages" class="space-y-3 max-h-80 overflow-y-auto mb-4 min-h-[60px]">
            <div class="text-center text-gray-300 text-sm py-4" id="qa-empty">输入问题，AI 帮你回忆剧情</div>
        </div>
        <div class="flex gap-2">
            <input type="text" id="qa-input" placeholder="例如：主角现在是什么境界？他和张三什么关系？" class="flex-1 border rounded-lg px-4 py-2 text-sm" onkeydown="if(event.key==='Enter')askQuestion()">
            <button onclick="askQuestion()" class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 transition text-sm">提问</button>
        </div>
    </div>

    <!-- Chapters -->
    <div id="chapters-section" class="bg-white rounded-lg shadow p-6 hidden">
        <h2 class="text-lg font-semibold mb-4">📑 章节列表</h2>
        <div id="chapter-list" class="space-y-1 max-h-80 overflow-y-auto"></div>
    </div>
</div>

</main>
<footer class="text-center text-gray-400 text-sm py-8">Reading Memory Agent MVP — 帮你快速恢复阅读状态</footer>
<script>
var novelId = window.location.pathname.split('/').filter(Boolean)[1];

async function loadNovel() {
    try {
        var resp = await fetch('/api/novels/' + novelId);
        var data = await resp.json();
        if (!resp.ok) { alert(data.error); window.location.href = '/'; return; }

        document.getElementById('novel-detail').innerHTML =
            '<div class="flex items-start justify-between">' +
            '<div>' +
            '<h1 class="text-2xl font-bold">' + escapeHtml(data.novel.title) + '</h1>' +
            '<p class="text-gray-500 mt-1">共 ' + data.novel.total_chapters + ' 章</p>' +
            '</div>' +
            '<a href="/novels/' + novelId + '/read" class="flex-shrink-0 bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition text-sm font-medium">📖 开始阅读</a>' +
            '</div>';

        document.getElementById('progress-section').classList.remove('hidden');
        document.getElementById('progress-input').max = data.novel.total_chapters;
        if (data.progress) document.getElementById('progress-input').value = data.progress.current_chapter;
        document.getElementById('actions-section').classList.remove('hidden');

        document.getElementById('chapters-section').classList.remove('hidden');
        document.getElementById('chapter-list').innerHTML = data.chapters.map(function(ch) {
            var color = ch.summary ? 'bg-green-50' : 'bg-gray-50';
            var badge = ch.summary ? '<span class="text-xs text-green-600">✓</span>' : '<span class="text-xs text-gray-400">○</span>';
            return '<div class="flex items-center justify-between p-2 rounded ' + color + '">' +
                '<span class="text-sm">第' + ch.chapter_number + '章 ' + escapeHtml(ch.title) + '</span>' + badge + '</div>';
        }).join('');
    } catch (err) { console.error(err); }
}

async function updateProgress() {
    var ch = parseInt(document.getElementById('progress-input').value);
    if (!ch || ch < 1) return;
    try {
        var resp = await fetch('/api/novels/' + novelId + '/progress', {
            method: 'PUT', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({current_chapter: ch})
        });
        var data = await resp.json();
        var fb = document.getElementById('progress-feedback');
        fb.classList.remove('hidden');
        fb.className = 'text-sm mt-2 ' + (resp.ok ? 'text-green-600' : 'text-red-600');
        fb.textContent = resp.ok ? '✅ 进度已更新' : '❌ ' + data.error;
    } catch (err) { console.error(err); }
}

async function generateRecap() {
    var btn = document.getElementById('recap-btn');
    var st = document.getElementById('recap-status');
    btn.disabled = true; btn.textContent = '⏳ 生成中...';
    st.classList.remove('hidden');
    st.className = 'mt-3 p-3 bg-blue-50 text-blue-700 rounded-lg text-sm';
    st.textContent = 'AI 正在检索相关章节并生成回顾...';
    try {
        var resp = await fetch('/api/novels/' + novelId + '/recap', { method: 'POST' });
        var data = await resp.json();
        if (resp.ok) { window.location.href = '/novels/' + novelId + '/recap'; }
        else {
            st.className = 'mt-3 p-3 bg-red-50 text-red-700 rounded-lg text-sm';
            st.textContent = '❌ ' + (data.error || '生成失败');
        }
    } catch (err) {
        st.className = 'mt-3 p-3 bg-red-50 text-red-700 rounded-lg text-sm';
        st.textContent = '❌ 网络错误: ' + err.message;
    }
    btn.disabled = false; btn.textContent = '✨ 生成回顾';
}

async function triggerParse() {
    try {
        await fetch('/api/novels/' + novelId + '/parse', { method: 'POST' });
        alert('AI 解析已开始（含 embedding 向量生成），请稍后刷新页面查看结果');
    } catch (err) { alert('触发失败: ' + err.message); }
}

// ---- Phase 2: Search ----
async function doSearch() {
    var q = document.getElementById('search-input').value.trim();
    if (!q) return;
    var container = document.getElementById('search-results');
    container.classList.remove('hidden');
    container.innerHTML = '<p class="text-gray-400 text-sm">🔍 搜索中...</p>';
    try {
        var resp = await fetch('/api/novels/' + novelId + '/search?q=' + encodeURIComponent(q));
        var data = await resp.json();
        if (!data.results || data.results.length === 0) {
            container.innerHTML = '<p class="text-gray-400 text-sm">未找到相关章节</p>';
            return;
        }
        container.innerHTML = '<p class="text-sm text-gray-500 mb-2">找到 ' + data.results.length + ' 个相关章节：</p>' +
            data.results.map(function(r) {
                return '<div class="p-3 bg-gray-50 rounded-lg mb-2 text-sm">' +
                    '<span class="font-medium text-blue-600">第' + r.chapter.chapter_number + '章</span> ' +
                    '<span class="text-gray-600">' + escapeHtml(r.chapter.title) + '</span> ' +
                    '<span class="text-xs text-gray-400">(' + (r.score*100).toFixed(1) + '% 匹配)</span>' +
                    (r.chapter.summary ? '<p class="text-gray-500 mt-1 text-xs">' + escapeHtml(r.chapter.summary) + '</p>' : '') +
                    '</div>';
            }).join('');
    } catch (err) {
        container.innerHTML = '<p class="text-red-500 text-sm">❌ ' + err.message + '</p>';
    }
}

// ---- Phase 2: Q&A (SSE streaming) ----
async function askQuestion() {
    var input = document.getElementById('qa-input');
    var q = input.value.trim();
    if (!q) return;
    var msgs = document.getElementById('qa-messages');
    document.getElementById('qa-empty').classList.add('hidden');

    // Show user question
    msgs.innerHTML += '<div class="flex justify-end"><div class="bg-blue-100 rounded-lg px-4 py-2 text-sm max-w-[80%]">' + escapeHtml(q) + '</div></div>';

    // Create AI response container
    var aiId = 'ai-msg-' + Date.now();
    msgs.innerHTML += '<div id="' + aiId + '" class="flex justify-start"><div class="bg-gray-100 rounded-lg px-4 py-2 text-sm max-w-[80%] msg-content text-gray-400">思考中...</div></div>';
    msgs.scrollTop = msgs.scrollHeight;
    input.value = '';

    try {
        var resp = await fetch('/api/novels/' + novelId + '/ask', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({question: q})
        });
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        var el = document.getElementById(aiId);
        var contentEl = el ? el.querySelector('.msg-content') : null;
        var firstDelta = true;

        while (true) {
            var result = await reader.read();
            if (result.done) break;
            buffer += decoder.decode(result.value, {stream: true});
            var lines = buffer.split('\n');
            buffer = lines.pop();
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                var eventData = '';
                if (line.startsWith('event:')) {
                    if (i + 1 < lines.length && lines[i + 1].trim().startsWith('data:')) {
                        eventData = lines[i + 1].trim().substring(5).trim(); i++;
                    }
                } else if (line.startsWith('data:')) {
                    eventData = line.substring(5).trim();
                }
                if (!eventData) continue;
                try {
                    var evt = JSON.parse(eventData);
                    if (evt.type === 'delta' || evt.type === 'done') {
                        if (firstDelta && contentEl) { contentEl.classList.remove('text-gray-400'); firstDelta = false; }
                        if (contentEl) contentEl.textContent = evt.content || '';
                    } else if (evt.type === 'error' && contentEl) {
                        contentEl.classList.add('text-red-600'); contentEl.textContent = '❌ ' + (evt.content || '');
                    }
                } catch(e) {}
            }
        }
    } catch (err) {
        var el = document.getElementById(aiId);
        if (el) el.innerHTML = '<div class="flex justify-start"><div class="bg-red-50 rounded-lg px-4 py-2 text-sm text-red-600">❌ ' + escapeHtml(err.message) + '</div></div>';
    }
    msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

loadNovel();
</script>
</body>
</html>
{{ end }}
