services:
  # ── PostgreSQL + pgvector ───────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: note-memory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: note_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d note_memory"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Neo4j 知识图谱 (可选) ───────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: note-memory-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ── 阅读记忆助手 ────────────────────────────────────────
  app:
    build: .
    container_name: note-memory-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: note_memory
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      # Server
      SERVER_PORT: "8080"
      # LLM — 替换为你的 API Key
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-api-key-here}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      # Embedding
      OPENAI_EMBEDDING_API_KEY: ${OPENAI_EMBEDDING_API_KEY:-}
      OPENAI_EMBEDDING_BASE_URL: ${OPENAI_EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-BAAI/bge-large-zh-v1.5}
      # Reranker (可选)
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
